[build]
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Cache static assets aggressively
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Consolidate all ranking signals on the apex domain
[[redirects]]
  from = "https://www.scalvitech.in/*"
  to = "https://scalvitech.in/:splat"
  status = 301
  force = true

# Pretty URLs - redirect /index to root
[[redirects]]
  from = "/index"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/projects"
  to = "/projects.html"
  status = 200
